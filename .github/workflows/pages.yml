name: Deploy AI student project site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'webexpo-transfer-prototype/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build downloadable ZIP packages
        run: |
          set -euo pipefail
          mkdir -p docs/packages
          rm -rf /tmp/ai_student_pack /tmp/ai_teacher_pack
          mkdir -p /tmp/ai_student_pack /tmp/ai_teacher_pack

          cp webexpo-transfer-prototype/START_HERE.md /tmp/ai_student_pack/00_START_HERE.md
          mkdir -p /tmp/ai_student_pack/01_dataset
          cp webexpo-transfer-prototype/data/sample_food_products.csv /tmp/ai_student_pack/01_dataset/sample_food_products.csv

          mkdir -p /tmp/ai_student_pack/02_student_instructions
          cp webexpo-transfer-prototype/course/01_orientation.md /tmp/ai_student_pack/02_student_instructions/01_orientation.md
          cp webexpo-transfer-prototype/course/02_tool_setup.md /tmp/ai_student_pack/02_student_instructions/02_tool_setup.md
          cp webexpo-transfer-prototype/course/03_dataset_walkthrough.md /tmp/ai_student_pack/02_student_instructions/03_dataset_walkthrough.md
          cp webexpo-transfer-prototype/course/04_ai_workflow_no_code.md /tmp/ai_student_pack/02_student_instructions/04_ai_workflow_no_code.md
          cp webexpo-transfer-prototype/course/05_validation_checklist.md /tmp/ai_student_pack/02_student_instructions/05_validation_checklist.md
          cp webexpo-transfer-prototype/templates/decision_brief_template.md /tmp/ai_student_pack/02_student_instructions/06_decision_brief_template.md

          mkdir -p /tmp/ai_student_pack/03_handout
          cp webexpo-transfer-prototype/handout/ai_project_checklist.md /tmp/ai_student_pack/03_handout/ai_project_checklist.md

          mkdir -p /tmp/ai_student_pack/04_prompts
          cp webexpo-transfer-prototype/prompts/prompt_pack.md /tmp/ai_student_pack/04_prompts/prompt_pack.md

          mkdir -p /tmp/ai_student_pack/05_examples
          cp webexpo-transfer-prototype/examples/beginner_walkthrough.md /tmp/ai_student_pack/05_examples/beginner_walkthrough.md
          cp webexpo-transfer-prototype/examples/example_decision_brief.md /tmp/ai_student_pack/05_examples/example_decision_brief.md

          mkdir -p /tmp/ai_student_pack/06_optional_technical
          cp webexpo-transfer-prototype/technical_demo/README.md /tmp/ai_student_pack/06_optional_technical/technical_readme.md
          cp webexpo-transfer-prototype/course/07_optional_coding_track.md /tmp/ai_student_pack/06_optional_technical/optional_coding_track.md
          cp webexpo-transfer-prototype/technical_demo/analyze_food_products.py /tmp/ai_student_pack/06_optional_technical/analyze_food_products.py
          cp webexpo-transfer-prototype/technical_demo/output/category_summary.csv /tmp/ai_student_pack/06_optional_technical/category_summary.csv

          cp webexpo-transfer-prototype/student_pack/README.md /tmp/ai_student_pack/README.md

          mkdir -p /tmp/ai_teacher_pack
          cp webexpo-transfer-prototype/lesson_plan_40min.md /tmp/ai_teacher_pack/lesson_plan_40min.md
          cp webexpo-transfer-prototype/course/08_teacher_notes.md /tmp/ai_teacher_pack/teacher_notes.md
          cp webexpo-transfer-prototype/delivery/teacher_pitch.md /tmp/ai_teacher_pack/teacher_pitch.md
          cp webexpo-transfer-prototype/delivery/README.md /tmp/ai_teacher_pack/delivery_strategy.md
          cp webexpo-transfer-prototype/delivery/google_drive_structure.md /tmp/ai_teacher_pack/google_drive_structure.md
          cp webexpo-transfer-prototype/delivery/teams_structure.md /tmp/ai_teacher_pack/teams_structure.md

          (cd /tmp && zip -qr "$GITHUB_WORKSPACE/docs/packages/AI_for_student_projects_student_pack.zip" ai_student_pack)
          (cd /tmp && zip -qr "$GITHUB_WORKSPACE/docs/packages/AI_for_student_projects_teacher_pack.zip" ai_teacher_pack)

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
